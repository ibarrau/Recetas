---
layout: default
---

<section class="section">
  <div class="container container--narrow">
    <header class="page-header">
      <h1>{{ page.title }}</h1>
      {% if page.description %}
        <p>{{ page.description }}</p>
      {% endif %}
    </header>

    <div class="card prose">
      {{ content }}
    </div>
  </div>
</section>
