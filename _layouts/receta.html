---
layout: default
---

<article class="recipe-single">
  <a href="{{ '/' | relative_url }}" class="btn-back">← Volver al inicio</a>
  
  <header class="recipe-header">
    <h1>{{ page.title }}</h1>
    <div class="recipe-meta-details">
      <span><strong>Tiempo:</strong> {{ page.tiempo }}</span>
      <span><strong>Dificultad:</strong> {{ page.dificultad }}</span>
      <span><strong>Porciones:</strong> {{ page.porciones }}</span>
    </div>
  </header>

  {% if page.imagen %}
    <img src="{{ page.imagen | relative_url }}" alt="{{ page.title }}" class="recipe-main-image">
  {% endif %}

  <div class="recipe-body">
    {{ content }}
  </div>
</article>
