title: "Sabores de Casa"
description: "Un recetario de cocina casero, responsive y hecho con Jekyll."
baseurl: "/Recetas"
url: "https://ibarrau.github.io"

lang: es
timezone: Jujuy/Argentina

markdown: kramdown
highlighter: rouge
permalink: /:collection/:name/

collections:
  recipes:
    output: true
    permalink: /recetas/:name/

defaults:
  - scope:
      path: ""
      type: "recipes"
    values:
      layout: "recipe"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock